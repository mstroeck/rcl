name: 'Review Council'
description: 'Multi-provider AI code review with consensus voting'
author: 'Review Council'
branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  github-token:
    description: 'GitHub token for API access (defaults to github.token)'
    required: false
    default: ${{ github.token }}
  anthropic-key:
    description: 'Anthropic API key for Claude models'
    required: false
  openai-key:
    description: 'OpenAI API key for GPT models'
    required: false
  google-key:
    description: 'Google API key for Gemini models'
    required: false
  models:
    description: 'Comma-separated list of models to use (e.g., "claude,gpt,gemini")'
    required: false
  fail-on:
    description: 'Severity threshold for CI failure (info|low|medium|high|critical)'
    required: false
    default: 'high'
  post-mode:
    description: 'How to post results to GitHub (comment|inline|both)'
    required: false
    default: 'inline'
  ignore:
    description: 'Comma-separated glob patterns to ignore'
    required: false
  require-consensus:
    description: 'Minimum number of models that must agree for blocking finding'
    required: false
  max-cost:
    description: 'Maximum cost in USD for this review run'
    required: false
  soft-fail:
    description: 'Report findings but always exit 0 (for CI)'
    required: false
    default: 'false'

outputs:
  findings-count:
    description: 'Number of findings detected'
  blocking-count:
    description: 'Number of blocking findings based on policy'
  policy-passed:
    description: 'Whether the policy evaluation passed (true/false)'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Review Council
      shell: bash
      run: npm install -g review-council

    - name: Run Review
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-key }}
        OPENAI_API_KEY: ${{ inputs.openai-key }}
        GOOGLE_API_KEY: ${{ inputs.google-key }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        # Build command arguments
        ARGS="--ci --post --post-mode '${{ inputs.post-mode }}' --github-token $GITHUB_TOKEN"

        if [ -n "${{ inputs.models }}" ]; then
          ARGS="$ARGS --models '${{ inputs.models }}'"
        fi

        if [ -n "${{ inputs.fail-on }}" ]; then
          ARGS="$ARGS --fail-on '${{ inputs.fail-on }}'"
        fi

        if [ -n "${{ inputs.ignore }}" ]; then
          ARGS="$ARGS --ignore '${{ inputs.ignore }}'"
        fi

        if [ -n "${{ inputs.require-consensus }}" ]; then
          ARGS="$ARGS --require-consensus '${{ inputs.require-consensus }}'"
        fi

        if [ -n "${{ inputs.max-cost }}" ]; then
          ARGS="$ARGS --max-cost '${{ inputs.max-cost }}'"
        fi

        if [ "${{ inputs.soft-fail }}" = "true" ]; then
          ARGS="$ARGS --soft-fail"
        fi

        # Run review
        rcl review "${{ github.repository }}#${{ github.event.pull_request.number }}" $ARGS
